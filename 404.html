<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
404 | Wrong Door
</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{

--bg:#05090d;
--bg2:#0d1b28;
--navy:#12283a;

--gold:#d59b38;
--gold-soft:#efc978;

--text:#f5efe3;
--muted:#c2b6a3;

}

body{

min-height:100vh;

font-family:Georgia,serif;

display:flex;

justify-content:center;

align-items:center;

padding:30px;

overflow:hidden;

background:

linear-gradient(
180deg,
var(--bg),
var(--bg2),
var(--navy)
);

color:var(--text);

position:relative;

}

body::before{

content:"";

position:absolute;

inset:0;

background:

radial-gradient(
circle at center,
rgba(
213,
155,
56,
.10
),
transparent 60%
);

opacity:.8;

}

.container{

position:relative;

z-index:2;

max-width:800px;

text-align:center;

padding:
clamp(
35px,
6vw,
70px
);

background:

linear-gradient(
180deg,

rgba(
18,
40,
58,
.88
),

rgba(
8,
10,
12,
.96
)

);

border-radius:28px;

border:
1px solid
rgba(
213,
155,
56,
.15
);

box-shadow:

0 0 45px
rgba(
0,
0,
0,
.45
);

}

.number{

font-size:
clamp(
4rem,
14vw,
9rem
);

color:var(--gold);

line-height:1;

margin-bottom:20px;

text-shadow:

0 0 25px
rgba(
213,
155,
56,
.35
);

}

h1{

font-size:
clamp(
1.8rem,
5vw,
3rem
);

margin-bottom:25px;

color:var(--gold-soft);

}

p{

font-size:
clamp(
1rem,
2vw,
1.1rem
);

line-height:2;

color:var(--muted);

margin-bottom:35px;

}

.quote{

padding:25px;

border-left:
4px solid
var(--gold);

background:
rgba(
255,
255,
255,
.03
);

border-radius:14px;

font-style:italic;

color:var(--gold-soft);

margin-bottom:40px;

}

.links{

display:flex;

justify-content:center;

gap:20px;

flex-wrap:wrap;

}

.links a{

text-decoration:none;

padding:
14px
30px;

border-radius:40px;

font-weight:bold;

background:

linear-gradient(
180deg,
var(--gold-soft),
var(--gold)
);

color:#111;

transition:.3s;

min-width:180px;

}

.links a:hover{

transform:
translateY(-5px);

box-shadow:

0 0 25px
rgba(
213,
155,
56,
.35
);

}

@media(
max-width:700px
){

.links{

flex-direction:column;

align-items:center;

}

.links a{

width:100%;

max-width:300px;

}

}

</style>
</head>

<body>

<div class="container">

<div class="number">

404

</div>

<h1>

This Door Leads Nowhere

</h1>

<p>

Elias discovered that every room carried purpose. Some doors led toward healing. Others revealed forgotten places needing care.

This doorway seems different.

The page you searched for could not be found.

</p>

<div class="quote">

“Every house reflects the heart.”

</div>

<div class="links">

<a href="index.html">

Return Home

</a>

<a href="contents.html">

View Contents

</a>

</div>

</div>

</body>
</html>
